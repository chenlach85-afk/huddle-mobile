kind = "mobile"
previewPath = "/mobile/"
title = "Clasiko"
version = "1.0.0"
id = "artifacts/huddle-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20507

[services.development]
run = "pnpm --filter @workspace/huddle-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/huddle-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/huddle-mobile", "run", "serve" ]

[services.env]
PORT = "20507"
BASE_PATH = "/mobile/"
